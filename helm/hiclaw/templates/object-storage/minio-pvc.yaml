{{- if and (eq .Values.objectStorage.type "minio") .Values.objectStorage.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hiclaw.minio.fullname" . }}-data
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "minio") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.objectStorage.minio.persistence.size | quote }}
  {{- if .Values.objectStorage.minio.persistence.storageClassName }}
  storageClassName: {{ .Values.objectStorage.minio.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
