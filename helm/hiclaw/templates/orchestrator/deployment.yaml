{{- $comp := dict "root" . "component" "orchestrator" }}
{{- $tag := include "hiclaw.imageTag" (dict "tag" .Values.orchestrator.image.tag "global" .Values.global) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.orchestrator.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hiclaw.component.selectorLabels" $comp | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hiclaw.component.selectorLabels" $comp | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hiclaw.orchestrator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orchestrator
          image: "{{ .Values.orchestrator.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.orchestrator.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hiclaw.secretName" . }}
          env:
            - name: HICLAW_PROXY_LISTEN
              value: {{ printf ":%v" .Values.orchestrator.service.targetPort | quote }}
            - name: HICLAW_ORCHESTRATOR_URL
              value: {{ include "hiclaw.orchestrator.internalURL" . | quote }}
            - name: HICLAW_RUNTIME
              value: "k8s"
            - name: HICLAW_WORKER_BACKEND
              value: {{ .Values.orchestrator.workerBackend | quote }}
            - name: HICLAW_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HICLAW_WORKER_IMAGE
              value: {{ include "hiclaw.worker.openclawImage" . | quote }}
            - name: HICLAW_COPAW_WORKER_IMAGE
              value: {{ include "hiclaw.worker.copawImage" . | quote }}
            - name: TZ
              value: {{ .Values.orchestrator.timezone | quote }}
            {{- if eq .Values.objectStorage.type "minio" }}
            - name: HICLAW_MINIO_ENDPOINT
              value: {{ include "hiclaw.minio.internalURL" . | quote }}
            - name: HICLAW_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_USER
            - name: HICLAW_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: HICLAW_MINIO_BUCKET
              value: {{ .Values.objectStorage.minio.bucketName | quote }}
            {{- end }}
            {{- range $k, $v := .Values.orchestrator.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
