{{- $comp := dict "root" . "component" "orchestrator" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hiclaw.orchestrator.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  type: {{ .Values.orchestrator.service.type }}
  selector:
    {{- include "hiclaw.component.selectorLabels" $comp | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.orchestrator.service.port }}
      targetPort: http
      protocol: TCP
