{{- if and (eq .Values.matrixServer.type "tuwunel") .Values.matrixServer.tuwunel.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hiclaw.tuwunel.fullname" . }}-data
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "tuwunel") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.matrixServer.tuwunel.persistence.size | quote }}
  {{- if .Values.matrixServer.tuwunel.persistence.storageClassName }}
  storageClassName: {{ .Values.matrixServer.tuwunel.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
