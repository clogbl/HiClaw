{{- if .Values.manager.enabled }}
{{- $comp := dict "root" . "component" "manager" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hiclaw.manager.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  type: {{ .Values.manager.service.type }}
  selector:
    {{- include "hiclaw.component.selectorLabels" $comp | nindent 4 }}
  ports:
    - name: openclaw
      port: {{ .Values.manager.service.port }}
      targetPort: {{ .Values.manager.service.targetPort }}
      protocol: TCP
{{- end }}
